<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer de Intervalos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      padding: 24px;
      text-align: center;
      background: #1b1b1b;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 18px;
      font-size: 28px;
    }

    .mode {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #2a2a2a;
      transition: background 0.2s ease;
    }

    .mode.run {
      background: #1f4d2e;
    }

    .mode.rest {
      background: #4d3f1f;
    }

    .time {
      font-size: 76px;
      font-weight: bold;
      margin: 18px 0 10px;
      letter-spacing: 2px;
      line-height: 1;
    }

    .info {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 10px;
    }

    .status {
      font-size: 14px;
      color: #9fd3ff;
      margin-bottom: 18px;
      min-height: 20px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      min-width: 110px;
    }

    .start {
      background: #2ecc71;
      color: #111;
    }

    .pause {
      background: #f1c40f;
      color: #111;
    }

    .reset {
      background: #e74c3c;
      color: #fff;
    }

    .small {
      margin-top: 18px;
      color: #aaa;
      font-size: 14px;
      line-height: 1.5;
    }

    .legend {
      margin-top: 16px;
      font-size: 13px;
      color: #bbb;
      line-height: 1.5;
    }

    .tap-note {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Timer de Intervalos</h1>

    <div id="mode" class="mode run">Correr</div>
    <div id="time" class="time">01:00</div>
    <div id="info" class="info">Intervalo 1</div>
    <div id="status" class="status">Listo para comenzar</div>

    <div class="buttons">
      <button class="start" id="startBtn">Iniciar</button>
      <button class="pause" id="pauseBtn">Pausar</button>
      <button class="reset" id="resetBtn">Reiniciar</button>
    </div>

    <div class="legend">
      Aviso suave a los 30 segundos · Aviso fuerte al finalizar el minuto
    </div>

    <div class="small">
      En iPhone conviene usar Safari y poner <strong>Bloqueo automático en Nunca</strong>.
    </div>

    <div class="tap-note">
      Tocá Iniciar una vez para habilitar el audio.
    </div>
  </div>

  <script>
    let runDuration = 60;
    let restDuration = 60;

    let currentMode = "run";
    let timeLeft = runDuration;
    let timer = null;
    let intervalCount = 1;
    let wakeLock = null;
    let audioCtx = null;
    let halfAlertPlayed = false;

    const modeEl = document.getElementById("mode");
    const timeEl = document.getElementById("time");
    const infoEl = document.getElementById("info");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");

    function formatTime(seconds) {
      const min = String(Math.floor(seconds / 60)).padStart(2, "0");
      const sec = String(seconds % 60).padStart(2, "0");
      return `${min}:${sec}`;
    }

    function updateDisplay() {
      timeEl.textContent = formatTime(timeLeft);

      if (currentMode === "run") {
        modeEl.textContent = "Correr";
        modeEl.className = "mode run";
      } else {
        modeEl.textContent = "Descanso";
        modeEl.className = "mode rest";
      }

      infoEl.textContent = `Intervalo ${intervalCount}`;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function initAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (audioCtx.state === "suspended") {
          await audioCtx.resume();
        }

        return true;
      } catch (error) {
        console.error("No se pudo iniciar el audio:", error);
        setStatus("No se pudo activar el audio");
        return false;
      }
    }

    function playTone(frequency, duration, volume, type = "sine", delay = 0) {
      if (!audioCtx) return;

      const startTime = audioCtx.currentTime + delay;
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);

      gainNode.gain.setValueAtTime(0.0001, startTime);
      gainNode.gain.exponentialRampToValueAtTime(volume, startTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.02);
    }

    function playHalfAlert() {
      try {
        playTone(880, 0.12, 0.08, "sine", 0);
      } catch (error) {
        console.error("Error en aviso de 30 segundos:", error);
      }
    }

    function playFinalAlert() {
      try {
        playTone(880, 0.16, 0.16, "sine", 0);
        playTone(1180, 0.22, 0.20, "sine", 0.23);
      } catch (error) {
        console.error("Error en aviso final:", error);
      }
    }

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
          setStatus("Pantalla activa durante el entrenamiento");

          wakeLock.addEventListener("release", () => {
            if (timer) {
              setStatus("La pantalla volvió a modo normal");
            }
          });
        } else {
          setStatus("Timer en marcha");
        }
      } catch (error) {
        console.error("Wake Lock error:", error);
        setStatus("Timer en marcha");
      }
    }

    async function releaseWakeLock() {
      try {
        if (wakeLock) {
          await wakeLock.release();
          wakeLock = null;
        }
      } catch (error) {
        console.error("Error liberando Wake Lock:", error);
      }
    }

    function switchMode() {
      playFinalAlert();

      if (currentMode === "run") {
        currentMode = "rest";
        timeLeft = restDuration;
        halfAlertPlayed = false;
      } else {
        currentMode = "run";
        timeLeft = runDuration;
        intervalCount++;
        halfAlertPlayed = false;
      }

      updateDisplay();
    }

    async function startTimer() {
      if (timer) return;

      const audioReady = await initAudio();
      if (!audioReady) return;

      // beep muy breve inicial para "despertar" el audio en algunos iPhone
      playTone(740, 0.05, 0.03, "sine", 0);

      await requestWakeLock();
      setStatus("Timer en marcha");

      timer = setInterval(() => {
        timeLeft--;

        if (timeLeft === 30 && !halfAlertPlayed) {
          playHalfAlert();
          halfAlertPlayed = true;
        }

        if (timeLeft <= 0) {
          switchMode();
        } else {
          updateDisplay();
        }
      }, 1000);
    }

    async function pauseTimer() {
      clearInterval(timer);
      timer = null;
      await releaseWakeLock();
      setStatus("Timer en pausa");
    }

    async function resetTimer() {
      clearInterval(timer);
      timer = null;
      await releaseWakeLock();

      currentMode = "run";
      timeLeft = runDuration;
      intervalCount = 1;
      halfAlertPlayed = false;

      updateDisplay();
      setStatus("Reiniciado");
    }

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && timer) {
        await requestWakeLock();
      }
    });

    startBtn.addEventListener("click", startTimer);
    pauseBtn.addEventListener("click", pauseTimer);
    resetBtn.addEventListener("click", resetTimer);

    updateDisplay();
  </script>
</body>
</html>
