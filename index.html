<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer de Intervalos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 430px;
      padding: 24px;
      text-align: center;
      background: #1b1b1b;
      border-radius: 18px;
      box-shadow: 0 0 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    .mode {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #2a2a2a;
    }

    .mode.run {
      background: #1f4d2e;
    }

    .mode.rest {
      background: #4d3f1f;
    }

    .time {
      font-size: 72px;
      font-weight: bold;
      margin: 20px 0;
      letter-spacing: 2px;
    }

    .info {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 14px;
    }

    .status {
      font-size: 14px;
      color: #9fd3ff;
      margin-bottom: 18px;
      min-height: 20px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .start {
      background: #2ecc71;
      color: #111;
    }

    .pause {
      background: #f1c40f;
      color: #111;
    }

    .reset {
      background: #e74c3c;
      color: #fff;
    }

    .small {
      margin-top: 20px;
      color: #aaa;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Timer de Intervalos</h1>

    <div id="mode" class="mode run">Correr</div>
    <div id="time" class="time">01:00</div>
    <div id="info" class="info">Intervalo 1</div>
    <div id="status" class="status">Listo para comenzar</div>

    <div class="buttons">
      <button class="start" id="startBtn">Iniciar</button>
      <button class="pause" id="pauseBtn">Pausar</button>
      <button class="reset" id="resetBtn">Reiniciar</button>
    </div>

    <div class="small">
      Consejo para iPhone: poné <strong>Bloqueo automático en Nunca</strong> para que la pantalla no se apague durante el entrenamiento.
    </div>
  </div>

  <script>
    let runDuration = 60;
    let restDuration = 60;

    let currentMode = "run";
    let timeLeft = runDuration;
    let timer = null;
    let intervalCount = 1;
    let wakeLock = null;

    const modeEl = document.getElementById("mode");
    const timeEl = document.getElementById("time");
    const infoEl = document.getElementById("info");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");

    function formatTime(seconds) {
      const min = String(Math.floor(seconds / 60)).padStart(2, "0");
      const sec = String(seconds % 60).padStart(2, "0");
      return `${min}:${sec}`;
    }

    function updateDisplay() {
      timeEl.textContent = formatTime(timeLeft);

      if (currentMode === "run") {
        modeEl.textContent = "Correr";
        modeEl.className = "mode run";
      } else {
        modeEl.textContent = "Descanso";
        modeEl.className = "mode rest";
      }

      infoEl.textContent = `Intervalo ${intervalCount}`;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function playBeep() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.18, audioCtx.currentTime);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.25);
      } catch (error) {
        console.error("No se pudo reproducir el beep:", error);
      }
    }

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
          setStatus("Pantalla activa durante el entrenamiento");

          wakeLock.addEventListener("release", () => {
            setStatus("La pantalla volvió a modo normal");
          });
        } else {
          setStatus("Tu navegador no soporta mantener la pantalla activa");
        }
      } catch (error) {
        setStatus("No se pudo activar el modo de pantalla despierta");
        console.error("Wake Lock error:", error);
      }
    }

    async function releaseWakeLock() {
      try {
        if (wakeLock) {
          await wakeLock.release();
          wakeLock = null;
        }
      } catch (error) {
        console.error("Error liberando Wake Lock:", error);
      }
    }

    function switchMode() {
      playBeep();

      if (currentMode === "run") {
        currentMode = "rest";
        timeLeft = restDuration;
      } else {
        currentMode = "run";
        timeLeft = runDuration;
        intervalCount++;
      }

      updateDisplay();
    }

    async function startTimer() {
      if (timer) return;

      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") {
          await audioCtx.resume();
        }
      } catch (error) {
        console.error("AudioContext:", error);
      }

      await requestWakeLock();

      setStatus("Timer en marcha");

      timer = setInterval(() => {
        timeLeft--;

        if (timeLeft <= 0) {
          switchMode();
        } else {
          updateDisplay();
        }
      }, 1000);
    }

    async function pauseTimer() {
      clearInterval(timer);
      timer = null;
      await releaseWakeLock();
      setStatus("Timer en pausa");
    }

    async function resetTimer() {
      clearInterval(timer);
      timer = null;
      await releaseWakeLock();

      currentMode = "run";
      timeLeft = runDuration;
      intervalCount = 1;
      updateDisplay();
      setStatus("Reiniciado");
    }

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && timer) {
        await requestWakeLock();
      }
    });

    startBtn.addEventListener("click", startTimer);
    pauseBtn.addEventListener("click", pauseTimer);
    resetBtn.addEventListener("click", resetTimer);

    updateDisplay();
  </script>
</body>
</html>
